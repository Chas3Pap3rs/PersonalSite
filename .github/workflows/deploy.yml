name: Deploy to VPS
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Verify build output
        run: |
          echo "Build output directory contents:"
          ls -la out/
          echo "Total size:"
          du -sh out/

      - name: Deploy to VPS via rsync
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_TARGET_DIR: ${{ secrets.VPS_TARGET_DIR }}
        run: |
          # Verify secrets are set
          if [ -z "$VPS_SSH_KEY" ]; then echo "Error: VPS_SSH_KEY is not set"; exit 1; fi
          if [ -z "$VPS_HOST" ]; then echo "Error: VPS_HOST is not set"; exit 1; fi
          if [ -z "$VPS_USER" ]; then echo "Error: VPS_USER is not set"; exit 1; fi
          if [ -z "$VPS_TARGET_DIR" ]; then echo "Error: VPS_TARGET_DIR is not set"; exit 1; fi
          
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # Add host to known_hosts
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null
          
          # Test SSH connection
          echo "Testing SSH connection..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST "echo 'SSH connection successful'"
          
          # Deploy with rsync
          echo "Deploying to $VPS_USER@$VPS_HOST:$VPS_TARGET_DIR"
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            out/ \
            $VPS_USER@$VPS_HOST:$VPS_TARGET_DIR
          
          echo "Deployment complete!"